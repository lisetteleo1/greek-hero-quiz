<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Which Greek Hero Are You?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', Georgia, serif;
            background: #2a1200;
        }

        .container {
            width: 100vw;
            height: calc(100vw * (16 / 9));
            max-height: 100vh;
            max-width: calc(100vh * (9 / 16));
            padding: 20px;
            border-radius: 10px;
            background: #c44a1a;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .greek-band {
            width: 100%;
            height: 18px;
            background: #1a0a00;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            margin: 6px 0;
        }

        .greek-band-inner {
            display: flex;
            gap: 0;
            height: 100%;
            align-items: center;
        }

        .key-unit {
            width: 18px;
            height: 12px;
            border: 2px solid #c44a1a;
            flex-shrink: 0;
            position: relative;
        }

        .key-unit::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 5px;
            height: 5px;
            border-top: 2px solid #c44a1a;
            border-right: 2px solid #c44a1a;
        }

        .title {
            font-family: 'Cinzel Decorative', Georgia, serif;
            font-size: clamp(13px, 3.5vw, 20px);
            color: #1a0a00;
            margin-bottom: 2vh;
            line-height: 1.3;
            letter-spacing: 1px;
        }

        .start-button {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(11px, 2.5vw, 15px);
            padding: 1vh 2vw;
            background-color: #1a0a00;
            color: #f5e4c0;
            border: 2px solid #f5e4c0;
            cursor: pointer;
            letter-spacing: 2px;
            margin-bottom: 2vh;
            transition: background 0.2s, color 0.2s;
        }

        .start-button:hover {
            background-color: #f5e4c0;
            color: #1a0a00;
        }

        .game-container {
            display: none;
            overflow: auto;
        }

        .story-text {
            font-size: clamp(9px, 2.2vw, 13px);
            color: #1a0a00;
            margin-bottom: 1rem;
            line-height: 1.6;
            font-style: italic;
            padding: 0 5%;
        }

        .choices {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            margin-top: 1.2rem;
        }

        .choice-button {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(8px, 1.9vw, 11px);
            padding: 1vh 1vw;
            border: 0.5px solid #1a0a00;
            background-color: rgba(26, 10, 0, 0.78);
            color: #f5e4c0;
            cursor: pointer;
            transition: background-color 0.25s;
            width: 90%;
            text-align: left;
            line-height: 1.5;
        }

        @media (hover: hover) {
            .choice-button:hover {
                background-color: #f5e4c0;
                color: #1a0a00;
            }
        }

        /* result */
        .result-name {
            font-family: 'Cinzel Decorative', Georgia, serif;
            font-size: clamp(15px, 4vw, 24px);
            color: #1a0a00;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .result-epithet {
            font-size: clamp(8px, 1.9vw, 11px);
            color: #1a0a00;
            font-style: italic;
            margin-bottom: 10px;
            opacity: 0.85;
        }

        .result-desc {
            font-size: clamp(8px, 1.7vw, 10px);
            color: #1a0a00;
            line-height: 1.65;
            padding: 0 6%;
            font-style: italic;
            margin-bottom: 10px;
        }


        .retry-button {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(9px, 2vw, 12px);
            padding: 8px 22px;
            background-color: #1a0a00;
            color: #f5e4c0;
            border: 1.5px solid #f5e4c0;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.2s, color 0.2s;
            margin-top: 4px;
        }

        .retry-button:hover {
            background: #f5e4c0;
            color: #1a0a00;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="greek-band" id="band-top"></div>

    <!-- HOME -->
    <div class="title" id="home-title">Which Greek Hero Are You?</div>
    <button class="start-button" id="start-btn" onclick="startGame()">Begin Your Quest ➤</button>

    <!-- GAME -->
    <div class="game-container" id="game-container">
        <div class="story-text" id="story-text"></div>
        <div class="choices" id="choices"></div>
    </div>

    <div class="greek-band" id="band-bottom"></div>

</div>

/* ============================================================
   SCORE TRACKING
   ============================================================ */
const scores = { "Heracles": 0, "Perseus": 0, "Theseus": 0, "Jason": 0 };
let currentState = "1";

/* ============================================================
   RENDER STATE
   ============================================================ */
function renderState(state) {
    const data = gameData[state];
    const storyText = document.getElementById("story-text");
    const choicesContainer = document.getElementById("choices");

    storyText.style.fontStyle = "italic";
    storyText.textContent = data.text;

    choicesContainer.innerHTML = "";

    for (const [choiceText, info] of Object.entries(data.choices)) {
        const button = document.createElement("button");
        button.textContent = choiceText;
        button.className = "choice-button";
        const nextState = info[0];
        const scoredHeroes = info[1];
        button.onclick = () => changeState(nextState, scoredHeroes);
        choicesContainer.appendChild(button);
    }
}

/* ============================================================
   CHANGE STATE
   ============================================================ */
function changeState(nextState, scoredHeroes) {
    scoredHeroes.forEach(h => { scores[h]++; });
    currentState = String(nextState);

    if (currentState === "0") {
        revealResult();
    } else {
        renderState(currentState);
    }
}

/* ============================================================
   REVEAL RESULT
   ============================================================ */
function revealResult() {
    let maxScore = 0;
    let winner = "Heracles";

    for (const [hero, score] of Object.entries(scores)) {
        if (score > maxScore) {
            maxScore = score;
            winner = hero;
        }
    }

    const h = heroes[winner];
    const storyText = document.getElementById("story-text");
    const choicesContainer = document.getElementById("choices");

    choicesContainer.innerHTML = "";
    storyText.style.fontStyle = "normal";

    storyText.innerHTML = `
        <div class="result-name">${h.name}</div>
        <div class="result-epithet">${h.epithet}</div>
        <img src="${h.image}" alt="${h.name}" style="max-width: 70%; margin: 10px auto; display: block; border-radius: 6px;"/>
        <div class="result-desc">${h.desc}</div>
        <button class="retry-button" onclick="resetGame()">⟳ Try Again</button>
    `;
}

/* ============================================================
   START / RESET
   ============================================================ */
function startGame() {
    document.getElementById("home-title").style.display = "none";
    document.getElementById("start-btn").style.display = "none";
    document.getElementById("game-container").style.display = "block";
    renderState("1");
}

function resetGame() {
    Object.keys(scores).forEach(k => { scores[k] = 0; });
    currentState = "1";

    const storyText = document.getElementById("story-text");
    storyText.style.fontStyle = "italic";
    storyText.innerHTML = "";

    document.getElementById("game-container").style.display = "none";
    document.getElementById("home-title").style.display = "block";
    document.getElementById("start-btn").style.display = "inline-block";
}

/* ============================================================
   GREEK KEY BANDS
   ============================================================ */
function buildBands() {
    ["band-top", "band-bottom"].forEach(id => {
        const band = document.getElementById(id);
        const inner = document.createElement("div");
        inner.className = "greek-band-inner";
        for (let i = 0; i < 50; i++) {
            const u = document.createElement("div");
            u.className = "key-unit";
            inner.appendChild(u);
        }
        band.appendChild(inner);
    });
}

buildBands();
